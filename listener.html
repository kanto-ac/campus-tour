<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎧 キャンパスツアー</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
  display: flex; justify-content: center; align-items: center;
  padding: 20px; color: #fff;
}
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 32px 28px;
  max-width: 420px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.18);
  text-align: center;
}
h1 { font-size: 1.5rem; margin-bottom: 6px; }
.subtitle { font-size: 0.85rem; opacity: 0.8; margin-bottom: 28px; }

.input-group { margin-bottom: 24px; }
.input-group label {
  display: block; font-size: 0.85rem; margin-bottom: 10px; opacity: 0.8;
}
.code-inputs { display: flex; justify-content: center; gap: 10px; }
.code-inputs input {
  width: 56px; height: 64px; text-align: center;
  font-size: 1.8rem; font-weight: 700;
  font-family: 'Courier New', monospace;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  background: rgba(255,255,255,0.15);
  color: #fff; outline: none;
  transition: border 0.3s;
}
.code-inputs input:focus {
  border-color: #fff;
  background: rgba(255,255,255,0.25);
}
.code-inputs input::placeholder { color: rgba(255,255,255,0.3); }

.btn {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  font-size: 1.1rem; font-weight: 700; cursor: pointer;
  transition: all 0.3s ease; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-connect { background: #fff; color: #11998e; }
.btn-connect:hover { background: #e0ffe0; transform: translateY(-2px); }
.btn-disconnect { background: #ff4757; color: #fff; }
.btn-disconnect:hover { background: #ff6b81; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.status-box {
  background: rgba(0,0,0,0.2); border-radius: 12px;
  padding: 16px; margin-bottom: 20px;
}
.status-box .label { font-size: 0.75rem; opacity: 0.6; margin-bottom: 4px; }
.status-box .value { font-size: 1.1rem; font-weight: 600; }

.volume-group {
  display: flex; align-items: center; gap: 12px;
  background: rgba(0,0,0,0.15); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 20px;
}
.volume-group label { font-size: 0.85rem; white-space: nowrap; }
.volume-group input[type=range] { flex: 1; accent-color: #fff; height: 6px; }
.volume-val { font-size: 0.85rem; font-weight: 700; min-width: 36px; }

.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
.dot-waiting { background: #ffa502; animation: pulse 1.5s infinite; }
.dot-connected { background: #2ed573; animation: pulse 0.8s infinite; }
.dot-error { background: #ff4757; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

.emoji-big { font-size: 4rem; margin-bottom: 16px; }
.info { font-size: 0.75rem; opacity: 0.5; margin-top: 8px; line-height: 1.5; }
.hidden { display: none !important; }

/* ===== ユーティリティボタン（ロック・全画面） ===== */
.util-buttons {
  display: none; gap: 10px; margin-top: 12px;
}
.btn-util {
  flex: 1; padding: 12px; border: 2px solid rgba(255,255,255,0.2);
  border-radius: 14px; font-size: 0.9rem; font-weight: 700;
  cursor: pointer;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.3s ease;
}
.btn-util:hover { background: rgba(255,255,255,0.15); }
.btn-util.active {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.4);
  color: #fff;
}

/* ===== 画面ロック ===== */
.lock-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 9999;
  display: flex; justify-content: center; align-items: center;
  user-select: none; -webkit-user-select: none;
  cursor: pointer;
}
.lock-message {
  color: #fff; text-align: center;
  font-size: 1.8rem; font-weight: 700;
  animation: lock-pulse 2s infinite;
}
.lock-sub {
  font-size: 1rem; font-weight: 400; opacity: 0.6;
  display: block; margin-top: 12px;
}
@keyframes lock-pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ===== スマホ表示を大きく ===== */
@media (max-width: 600px) {
  body { padding: 10px; }
  .card { padding: 28px 20px; border-radius: 20px; }
  .emoji-big { font-size: 5rem; }
  h1 { font-size: 1.8rem; }
  .subtitle { font-size: 1rem; }
  .input-group label { font-size: 1rem; }
  .code-inputs { gap: 12px; }
  .code-inputs input {
    width: 64px; height: 74px;
    font-size: 2.2rem;
    border-radius: 14px;
  }
  .btn { padding: 20px; font-size: 1.3rem; border-radius: 16px; }
  .status-box .label { font-size: 0.9rem; }
  .status-box .value { font-size: 1.3rem; }
  .volume-group { padding: 16px 20px; }
  .volume-group label { font-size: 1rem; }
  .volume-val { font-size: 1rem; }
  .info { font-size: 0.9rem; }
  .btn-util { font-size: 1rem; padding: 14px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="emoji-big">🎧</div>
  <h1>キャンパスツアー</h1>
  <p class="subtitle">ガイドの声をスマホで聞こう</p>

  <!-- 接続前 -->
  <div id="connect-section">
    <div class="input-group">
      <label>ルームコードを入力（4桁）</label>
      <div class="code-inputs" id="code-inputs">
        <input type="tel" maxlength="1" placeholder="0">
        <input type="tel" maxlength="1" placeholder="0">
        <input type="tel" maxlength="1" placeholder="0">
        <input type="tel" maxlength="1" placeholder="0">
      </div>
    </div>
    <button class="btn btn-connect" id="btn-connect" onclick="connectToHost()">
      🔗 接続する
    </button>
  </div>

  <!-- 接続後 -->
  <div id="connected-section" class="hidden">
    <div class="status-box">
      <div class="label">ステータス</div>
      <div class="value" id="status"><span class="dot dot-waiting"></span>接続中...</div>
    </div>

    <div class="volume-group">
      <label>🔊 音量</label>
      <input type="range" id="volume" min="0" max="100" value="80"
             oninput="changeVolume(this.value)">
      <span class="volume-val" id="volume-val">80%</span>
    </div>

    <button class="btn btn-disconnect" onclick="disconnect()">
      ✕ 切断する
    </button>
  </div>

  <p class="info">イヤホンの使用を推奨します 🎧<br>接続がうまくいかない場合はコードを確認してください</p>

  <!-- ロック & 全画面ボタン -->
  <div class="util-buttons" id="util-buttons">
    <button class="btn-util" id="btn-fullscreen" onclick="toggleFullscreen()">
      📺 全画面
    </button>
    <button class="btn-util" id="btn-lock" onclick="toggleLock()">
      🔒 ロック
    </button>
  </div>
</div>

<!-- ロック中のオーバーレイ -->
<div class="lock-overlay" id="lock-overlay" style="display:none;">
  <div class="lock-message">
    🔒 画面ロック中<br>
    <span class="lock-sub">解除するには長押し（1秒）</span>
  </div>
</div>

<audio id="audio" autoplay playsinline></audio>

<script>
// ---- コード入力の自動フォーカス移動 ----
var codeInputs = document.querySelectorAll('#code-inputs input');
codeInputs.forEach(function(inp, i) {
  inp.addEventListener('input', function() {
    inp.value = inp.value.replace(/\D/g, '').slice(-1);
    if (inp.value && i < 3) codeInputs[i + 1].focus();
    if (getCode().length === 4) document.getElementById('btn-connect').focus();
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !inp.value && i > 0) codeInputs[i - 1].focus();
  });
});

function getCode() {
  return Array.from(codeInputs).map(function(i) { return i.value; }).join('');
}

var peer = null;
var currentCall = null;

function connectToHost() {
  var code = getCode();
  if (code.length !== 4) {
    alert('4桁のルームコードを入力してください');
    return;
  }

  var btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.textContent = '⏳ 接続中...';

  document.getElementById('connect-section').classList.add('hidden');
  document.getElementById('connected-section').classList.remove('hidden');
  document.getElementById('status').innerHTML =
    '<span class="dot dot-waiting"></span>接続中...';

  // ユーティリティボタンを表示
  document.getElementById('util-buttons').style.display = 'flex';

  var hostPeerId = 'campus-tour-' + code;
  peer = new Peer();

  // タイムアウト（10秒）
  var timeout = setTimeout(function() {
    document.getElementById('status').innerHTML =
      '<span class="dot dot-error"></span>タイムアウト — コードを確認してください';
    showRetry();
  }, 10000);

  peer.on('open', function() {
    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var oscillator = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    gain.gain.value = 0;
    oscillator.connect(gain);
    var dest = audioCtx.createMediaStreamDestination();
    gain.connect(dest);
    oscillator.start();
    var dummyStream = dest.stream;

    var call = peer.call(hostPeerId, dummyStream);
    currentCall = call;

    call.on('stream', function(remoteStream) {
      clearTimeout(timeout);
      var audio = document.getElementById('audio');
      audio.srcObject = remoteStream;
      audio.volume = document.getElementById('volume').value / 100;
      audio.play().catch(function() {});

      document.getElementById('status').innerHTML =
        '<span class="dot dot-connected"></span>接続済み — ガイドの声が聞こえます 🎤';
    });

    call.on('close', function() {
      document.getElementById('status').innerHTML =
        '<span class="dot dot-error"></span>配信が終了しました';
      showRetry();
    });

    call.on('error', function(err) {
      clearTimeout(timeout);
      console.error(err);
      document.getElementById('status').innerHTML =
        '<span class="dot dot-error"></span>接続エラー';
      showRetry();
    });
  });

  peer.on('error', function(err) {
    clearTimeout(timeout);
    console.error('Peer error:', err);
    if (err.type === 'peer-unavailable') {
      document.getElementById('status').innerHTML =
        '<span class="dot dot-error"></span>ルームが見つかりません — コードを確認してください';
    } else {
      document.getElementById('status').innerHTML =
        '<span class="dot dot-error"></span>接続エラー: ' + err.type;
    }
    showRetry();
  });
}

function showRetry() {
  document.getElementById('connected-section').classList.add('hidden');
  document.getElementById('connect-section').classList.remove('hidden');
  document.getElementById('util-buttons').style.display = 'none';
  var btn = document.getElementById('btn-connect');
  btn.disabled = false;
  btn.textContent = '🔗 接続する';
}

function disconnect() {
  if (currentCall) currentCall.close();
  if (peer) { peer.destroy(); peer = null; }
  document.getElementById('audio').srcObject = null;

  document.getElementById('connected-section').classList.add('hidden');
  document.getElementById('connect-section').classList.remove('hidden');
  document.getElementById('util-buttons').style.display = 'none';

  // 全画面を解除
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
  document.getElementById('btn-fullscreen').classList.remove('active');
  document.getElementById('btn-fullscreen').innerHTML = '📺 全画面';

  var btn = document.getElementById('btn-connect');
  btn.disabled = false;
  btn.textContent = '🔗 接続する';
  codeInputs.forEach(function(i) { i.value = ''; });
}

function changeVolume(val) {
  document.getElementById('audio').volume = val / 100;
  document.getElementById('volume-val').textContent = val + '%';
}

// ===========================
// 全画面モード
// ===========================
function toggleFullscreen() {
  var btn = document.getElementById('btn-fullscreen');
  var elem = document.documentElement;

  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    // 全画面にする
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
      elem.webkitRequestFullscreen();
    }
    btn.innerHTML = '✕ 全画面解除';
    btn.classList.add('active');
  } else {
    // 全画面を解除
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
    btn.innerHTML = '📺 全画面';
    btn.classList.remove('active');
  }
}

// ブラウザ側で全画面解除されたときの同期
document.addEventListener('fullscreenchange', syncFullscreenBtn);
document.addEventListener('webkitfullscreenchange', syncFullscreenBtn);
function syncFullscreenBtn() {
  var btn = document.getElementById('btn-fullscreen');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    btn.innerHTML = '📺 全画面';
    btn.classList.remove('active');
  }
}

// ===========================
// 画面ロック機能
// ===========================
var isLocked = false;
var lockTimer = null;
var overlay = document.getElementById('lock-overlay');

function toggleLock() {
  isLocked = true;
  overlay.style.display = 'flex';
}

// スマホ用（タッチ長押しで解除）
overlay.addEventListener('touchstart', function(e) {
  e.preventDefault();
  lockTimer = setTimeout(function() {
    isLocked = false;
    overlay.style.display = 'none';
  }, 1000);
});
overlay.addEventListener('touchend', function() {
  clearTimeout(lockTimer);
});
overlay.addEventListener('touchcancel', function() {
  clearTimeout(lockTimer);
});

// PC用（マウス長押しで解除）
overlay.addEventListener('mousedown', function() {
  lockTimer = setTimeout(function() {
    isLocked = false;
    overlay.style.display = 'none';
  }, 1000);
});
overlay.addEventListener('mouseup', function() {
  clearTimeout(lockTimer);
});

// ========================================
// 自動接続: URLパラメータからルームコード取得
// ========================================
window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var room = params.get('room') || '';
  if (room.length === 4 && /^\d{4}$/.test(room)) {
    var digits = room.split('');
    codeInputs.forEach(function(inp, i) { inp.value = digits[i] || ''; });
    connectToHost();
  }
});
</script>
</body>
</html>
