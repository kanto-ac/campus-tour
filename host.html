<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex; justify-content: center; align-items: center;
  padding: 20px; color: #fff;
}
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 32px 28px;
  max-width: 420px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.18);
  text-align: center;
}
h1 { font-size: 1.5rem; margin-bottom: 6px; }
.subtitle { font-size: 0.85rem; opacity: 0.8; margin-bottom: 24px; }

.room-code-box {
  background: rgba(255,255,255,0.15);
  border-radius: 16px; padding: 16px; margin-bottom: 20px;
}
.room-code-label { font-size: 0.8rem; opacity: 0.7; margin-bottom: 6px; }
.room-code {
  font-size: 3rem; font-weight: 800; letter-spacing: 12px;
  font-family: 'Courier New', monospace;
}

#qr-img {
  margin: 0 auto 20px; border-radius: 12px;
  background: #fff; padding: 8px;
  display: none; width: 180px; height: 180px;
}

.btn {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  font-size: 1.1rem; font-weight: 700; cursor: pointer;
  transition: all 0.3s ease; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-start { background: #00d2ff; color: #1a1a2e; }
.btn-start:hover { background: #00e5ff; transform: translateY(-2px); }
.btn-stop { background: #ff4757; color: #fff; }
.btn-stop:hover { background: #ff6b81; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.status-bar {
  display: flex; justify-content: space-around;
  background: rgba(0,0,0,0.2); border-radius: 12px;
  padding: 14px; margin-bottom: 20px;
}
.status-item { text-align: center; }
.status-item .label { font-size: 0.7rem; opacity: 0.6; }
.status-item .value { font-size: 1.3rem; font-weight: 700; }

.visualizer {
  display: flex; justify-content: center; align-items: flex-end;
  gap: 3px; height: 50px; margin-bottom: 20px;
}
.visualizer .bar {
  width: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.3);
  transition: height 0.05s ease;
}

.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
.dot-waiting { background: #ffa502; animation: pulse 1.5s infinite; }
.dot-live { background: #2ed573; animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

.info { font-size: 0.75rem; opacity: 0.5; margin-top: 12px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <h1>🎤 キャンパスツアー配信</h1>
  <p class="subtitle">あなたの声を参加者のスマホに届けます</p>

  <div class="room-code-box">
    <div class="room-code-label">ルームコード</div>
    <div class="room-code" id="room-code">----</div>
  </div>

  <img id="qr-img" alt="QR Code"> 

  <div class="visualizer" id="visualizer"></div>

  <button class="btn btn-start" id="btn-toggle" onclick="toggleBroadcast()">
    ▶ 配信をスタート
  </button>

  <div class="status-bar">
    <div class="status-item">
      <div class="label">ステータス</div>
      <div class="value" id="status"><span class="dot dot-waiting"></span>待機中</div>
    </div>
    <div class="status-item">
      <div class="label">リスナー数</div>
      <div class="value" id="listener-count">0</div>
    </div>
  </div>

  <p class="info">
    参加者に「ルームコード」または「QRコード」を共有してください。<br>
    参加者はイヤホン推奨です 🎧
  </p>
</div>

<script>
var NUM_BARS = 24;
var vizContainer = document.getElementById('visualizer');
for (var i = 0; i < NUM_BARS; i++) {
  var bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.height = '4px';
  vizContainer.appendChild(bar);
}
var bars = vizContainer.querySelectorAll('.bar');

var peer = null;
var localStream = null;
var broadcasting = false;
var activeCalls = [];
var analyser = null;
var animFrameId = null;

function generateCode() {
  return String(Math.floor(1000 + Math.random() * 9000));
}

function toggleBroadcast() {
  if (!broadcasting) startBroadcast();
  else stopBroadcast();
}

function startBroadcast() {
  var btn = document.getElementById('btn-toggle');
  btn.disabled = true;
  btn.textContent = '⏳ マイク準備中...';

  navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    .then(function(stream) {
      localStream = stream;
      setupAudio(stream);
      setupPeer();
    })
    .catch(function(e) {
      alert('マイクへのアクセスが許可されていません。\nブラウザの設定を確認してください。');
      btn.disabled = false;
      btn.innerHTML = '▶ 配信をスタート';
    });
}

function setupAudio(stream) {
  var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  source.connect(analyser);
  drawVisualizer();
}

function setupPeer() {
  var roomCode = generateCode();
  document.getElementById('room-code').textContent = roomCode;
  var peerId = 'campus-tour-' + roomCode;

  peer = new Peer(peerId);

  peer.on('open', function() {
    broadcasting = true;
    var btn = document.getElementById('btn-toggle');
    btn.disabled = false;
    btn.className = 'btn btn-stop';
    btn.innerHTML = '⏹ 配信を停止';
    document.getElementById('status').innerHTML =
      '<span class="dot dot-live"></span>配信中';

    // QRコード生成（リスナーURL）
    var listenerURL = window.location.href.split('?')
    [0].replace('host.html','listener.html') + '?room=' + roomCode;
    var qrImg = document.getElementById('qr-img');
    QRCode.toDataURL(listenerURL, {
      width: 164, margin: 1,
      color: { dark: '#1a1a2e', light: '#ffffff' }
    },function(err , url){
      qrImg.src = url;
      qrImg.style.display = 'block'
    });
    });

  peer.on('call', function(call) {
    call.answer(localStream);
    activeCalls.push(call);
    updateListenerCount();

    call.on('close', function() {
      activeCalls = activeCalls.filter(function(c) { return c !== call; });
      updateListenerCount();
    });
    call.on('error', function() {
      activeCalls = activeCalls.filter(function(c) { return c !== call; });
      updateListenerCount();
    });
  });

  peer.on('error', function(err) {
    console.error('Peer error:', err);
    if (err.type === 'unavailable-id') {
      alert('このルームコードは既に使用されています。もう一度お試しください。');
      stopBroadcast();
    }
  });
}

function stopBroadcast() {
  broadcasting = false;
  if (localStream) {
    localStream.getTracks().forEach(function(t) { t.stop(); });
    localStream = null;
  }
  activeCalls.forEach(function(c) { c.close(); });
  activeCalls = [];
  if (peer) { peer.destroy(); peer = null; }
  if (animFrameId) cancelAnimationFrame(animFrameId);

  var btn = document.getElementById('btn-toggle');
  btn.className = 'btn btn-start';
  btn.innerHTML = '▶ 配信をスタート';
  btn.disabled = false;

  document.getElementById('status').innerHTML =
    '<span class="dot dot-waiting"></span>待機中';
  document.getElementById('listener-count').textContent = '0';
  document.getElementById('room-code').textContent = '----';
  document.getElementById('qr-img').style.display = 'none';
  bars.forEach(function(b) { b.style.height = '4px'; });
}

function updateListenerCount() {
  document.getElementById('listener-count').textContent = activeCalls.length;
}

function drawVisualizer() {
  if (!analyser) return;
  var data = new Uint8Array(analyser.frequencyBinCount);
  function draw() {
    animFrameId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    for (var i = 0; i < NUM_BARS; i++) {
      var idx = Math.floor(i * data.length / NUM_BARS);
      var val = data[idx] || 0;
      var h = Math.max(4, (val / 255) * 50);
      bars[i].style.height = h + 'px';
      var brightness = 0.3 + (val / 255) * 0.7;
      bars[i].style.background = 'rgba(255,255,255,' + brightness + ')';
    }
  }
  draw();
}
</script>
</body>
</html>
